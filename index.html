<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel ESP32</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="status-band">
        <div>
          <p class="eyebrow">ESP32</p>
          <h1>Conexion WiFi y mensajes</h1>
        </div>
        <div class="status-grid" aria-label="Estado de conexiones">
          <div class="status-pill" id="serialStatus">
            <span class="dot"></span>
            USB desconectado
          </div>
          <div class="status-pill" id="socketStatus">
            <span class="dot"></span>
            WebSocket desconectado
          </div>
        </div>
      </section>

      <section class="workspace">
        <aside class="panel controls" aria-label="Controles ESP32">
          <div class="block">
            <h2>USB / Serial</h2>
            <div class="button-row">
              <button id="connectSerialBtn" type="button">Conectar USB</button>
              <button id="disconnectSerialBtn" type="button" class="secondary" disabled>Desconectar</button>
            </div>
            <label>
              Velocidad
              <select id="baudRate">
                <option value="115200" selected>115200</option>
                <option value="9600">9600</option>
                <option value="57600">57600</option>
                <option value="921600">921600</option>
              </select>
            </label>
          </div>

          <form class="block" id="wifiForm">
            <h2>WiFi</h2>
            <label>
              Red
              <input id="ssid" name="ssid" autocomplete="off" placeholder="Nombre de la red" required>
            </label>
            <label>
              Clave
              <input id="password" name="password" type="password" placeholder="Clave WiFi">
            </label>
            <button id="sendWifiBtn" type="submit" disabled>Enviar WiFi al ESP32</button>
          </form>

          <form class="block" id="socketForm">
            <h2>Mensajes por red</h2>
            <label>
              URL WebSocket
              <input id="socketUrl" name="socketUrl" value="ws://192.168.4.1/ws" required>
            </label>
            <div class="button-row">
              <button id="connectSocketBtn" type="submit">Conectar</button>
              <button id="disconnectSocketBtn" type="button" class="secondary" disabled>Desconectar</button>
            </div>
          </form>

          <form class="block" id="sendMessageForm">
            <h2>Enviar comando</h2>
            <label>
              Mensaje
              <textarea id="outgoingMessage" rows="4" placeholder='{"type":"ping"}'></textarea>
            </label>
            <div class="button-row">
              <button id="sendSerialMessageBtn" type="button" disabled>USB</button>
              <button id="sendSocketMessageBtn" type="submit" disabled>WebSocket</button>
            </div>
          </form>
        </aside>

        <section class="messages" aria-label="Mensajes recibidos">
          <div class="messages-header">
            <div>
              <p class="eyebrow">Monitor</p>
              <h2>Mensajes del ESP32</h2>
            </div>
            <button id="clearLogBtn" type="button" class="secondary">Limpiar</button>
          </div>
          <ol id="messageLog" class="message-log" aria-live="polite"></ol>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
